<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习记录 · 郭宇</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body class="sub-page">

  <nav id="navbar">
    <div class="nav-inner">
      <a class="nav-back" href="index.html">← 返回主页</a>
      <span class="nav-logo">GY</span>
      <span class="nav-spacer"></span>
    </div>
  </nav>

  <section class="section sub-hero">
    <div class="container">
      <h1 class="sub-title">学习记录</h1>
      <p class="sub-desc">每次遇到问题，每次找到答案——这是成长的足迹。</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="learning-list" id="learning-list">
        <p style="color:var(--text-secondary);">学习记录即将上线...</p>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 郭宇</p>
  </footer>

  <script>
    (function() {
      fetch('data/learning.json')
        .then(function(res) { return res.json(); })
        .then(function(items) {
          var list = document.getElementById('learning-list');
          if (!list || !items || items.length === 0) return;
          list.innerHTML = items.map(function(item) {
            return '<div class="learning-item learning-item-open">' +
              '<div class="problem">' + esc(item.problem) + '</div>' +
              '<div class="solution">' + esc(item.solution) + '</div>' +
              '<div class="date">' + esc(item.date) + '</div>' +
              '</div>';
          }).join('');
        })
        .catch(function(err) { console.error(err); });

      function esc(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }
    })();
  </script>

</body>
</html>
