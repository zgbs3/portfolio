<body class="sub-page">

  <nav id="navbar">
    <div class="nav-inner">
      <a class="nav-back" href="index.html">← 返回主页</a>
      <span class="nav-logo">GY</span>
      <span class="nav-spacer"></span>
    </div>
  </nav>

  <section class="section sub-hero">
    <div class="container">
      <h1 class="sub-title reveal">创意合集</h1>
      <p class="sub-desc reveal">创作灵感、视觉实验、个人项目的汇集地。</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="creative-grid" id="creative-grid">
        <p style="color:var(--text-secondary);grid-column:1/-1;">创意内容即将上线...</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="index.html">首页</a>
        <a href="works.html">作品</a>
        <a href="creative.html">创意</a>
        <a href="learning.html">学习</a>

      <p class="footer-tagline">永远热情，永远追逐。</p>
      <p class="footer-copy">&copy; 2026 郭宇</p>
    </div>
  </footer>

  <button id="back-to-top" aria-label="回到顶部">↑</button>
  <script src="js/main.js?v=7"></script>
  <script>
    (function() {
      fetch('data/creative.json')
        .then(function(res) { return res.json(); })
        .then(function(items) {
          var grid = document.getElementById('creative-grid');
          if (!grid || !items || items.length === 0) return;
          grid.innerHTML = items.map(function(item) {
            return '<div class="creative-card reveal">' +
              (item.image ? '<img src="' + esc(item.image) + '" alt="' + esc(item.title) + '" loading="lazy">' : '') +
              '<div class="creative-card-body">' +
              '<h4>' + esc(item.title) + '</h4>' +
              '<p>' + esc(item.description) + '</p>' +
              (item.date ? '<div class="date">' + esc(item.date) + '</div>' : '') +
              '</div></div>';
          }).join('');

          // Observe newly added reveal elements
          var newCards = grid.querySelectorAll('.reveal');
          for (var i = 0; i < newCards.length; i++) {
            window.__observeReveal && window.__observeReveal(newCards[i]);
          }
        })
        .catch(function(err) { console.error(err); });

      function esc(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }
    })();
  </script>

</body>
</html>
